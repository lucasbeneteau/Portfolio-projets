<VirtualHost 192.168.10.1:5501>
	ServerName admin.rainbowbank.com
	ServerAlias www.admin.rainbowbank.com
	ServerAdmin webmaster@localhost
	
	RewriteEngine On
	RewriteCond %{HTTPS} !=on
	RewriteRule ^ https://%{SERVER_NAME}:5502%{REQUEST_URI} [END,QSA,R=permanent]
</VirtualHost>

<VirtualHost 192.168.10.1:5502>
	ServerName admin.rainbowbank.com
	ServerAlias www.admin.rainbowbank.com
	ServerAdmin webmaster@localhost

	DocumentRoot /var/www/admin.rainbowbank.com

	SSLEngine On	
	SSLCertificateFile /etc/ssl/certs/wildcard_rainbowbank_com.crt
	SSLCertificateKeyFile /etc/ssl/private/wildcard_rainbowbank_com.key


	<Directory /var/www/admin.rainbow.bank.com>
		AllowOverride none
		Require ip 192.168.10.2
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/rainbowbank.error.log
	CustomLog ${APACHE_LOG_DIR}/admin.rainbowbank.access.log combined

</VirtualHost>
