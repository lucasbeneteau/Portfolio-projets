<VirtualHost 10.0.0.10:80>
	ServerName extranet.rainbowbank.com
	ServerAlias www.extranet.rainbowbank.com
	ServerAdmin webmaster@localhost

	RewriteEngine On
	RewriteCond %{HTTPS} !=on
	RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,QSA,R=permanent]

</VirtualHost>

<VirtualHost 10.0.0.10:443>
	ServerName extranet.rainbowbank.com
	ServerAlias www.extranet.rainbowbank.com
	ServerAdmin webmaster@localhost

	DocumentRoot /var/www/extranet.rainbowbank.com

	SSLEngine On
	SSLCertificateFile /etc/ssl/certs/wildcard_rainbowbank_com.crt
	SSLCertificatekeyFile /etc/ssl/private/wildcard_rainbowbank_com.key

	<Directory /var/www/extranet.rainbowbank.com>
		AllowOverride none
		Require ip 10.0.0.0/24
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/rainbowbank.error.log
	CustomLog ${APACHE_LOG_DIR}/extranet.rainbowbank.access.log combined

</VirtualHost>
